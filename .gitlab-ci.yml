stages:
  - check
  - sim

variables:
  CHECK_PYTHON_IMAGE: python:3.13-slim
  SIM_PYTHON_IMAGE: python:3.13-slim

check_conventions:
  stage: check
  image: $CHECK_PYTHON_IMAGE
  script:
    - pip install -r requirements/check.txt
    - python3 scripts/check_conventions.py

check_python_format:
  stage: check
  image: $CHECK_PYTHON_IMAGE
  script:
    - pip install -r requirements/check.txt
    - black --check .

cocotb_sim:
  stage: sim
  image: $SIM_PYTHON_IMAGE
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends verilator make g++
    - pip install -r requirements/sim.txt
  script:
    - pytest -vv sim/test_runner.py

