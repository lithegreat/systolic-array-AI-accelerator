stages:
  - check
  - sim

# The group5-runner host is a small 2 vCPU / 1 GB Azure VM. Two heavy sim
# containers (Verilator build + cocotb) running concurrently exhaust its RAM
# and wedge the box, so every job is interruptible and the sim jobs are
# serialized via a shared resource_group with a hard timeout.
default:
  interruptible: true

variables:
  # Prebuilt CI images live locally on the group5-runner host (the LRZ GitLab
  # instance has no Container Registry). They are built on the runner with:
  #   docker build -f ci/check.Dockerfile -t group5-ci-check:latest .
  #   docker build -f ci/sim.Dockerfile   -t group5-ci-sim:latest   .
  # and consumed here via the runner's `pull_policy = ["if-not-present"]`, so
  # the check/sim jobs run with no per-pipeline apt/pip install. Rebuild the
  # images on the runner when ci/*.Dockerfile or requirements/* change.
  CHECK_IMAGE: "group5-ci-check:latest"
  SIM_IMAGE: "group5-ci-sim:latest"
  # Full-SoC sim image: SIM_IMAGE + colorama + prebaked Didactic-SoC bender
  # checkouts / vendored IPs. Built on the runner with:
  #   docker build -f ci/soc.Dockerfile -t group5-ci-soc:latest .
  SOC_IMAGE: "group5-ci-soc:latest"

# ---------------------------------------------------------------------------
# Check stage: tooling (ruff, pre_commit) is baked into CHECK_IMAGE.
# ---------------------------------------------------------------------------
check_conventions:
  stage: check
  image: $CHECK_IMAGE
  script:
    - python3 scripts/check_conventions.py

check_python_format:
  stage: check
  image: $CHECK_IMAGE
  script:
    - ruff format --check .

check_gitkeep:
  stage: check
  image: $CHECK_IMAGE
  script:
    - python3 scripts/check_gitkeep.py

check_docs:
  stage: check
  image: $CHECK_IMAGE
  script:
    - python3 scripts/check_docs.py

# ---------------------------------------------------------------------------
# Sim stage: Verilator + Python sim deps are baked into SIM_IMAGE.
# ---------------------------------------------------------------------------
cocotb_sim:
  stage: sim
  image: $SIM_IMAGE
  resource_group: sim-runner
  timeout: 5m
  script:
    - pytest -vv sim/test_runner.py

accel_verilator_sim:
  stage: sim
  image: $SIM_IMAGE
  resource_group: sim-runner
  timeout: 5m
  script:
    - ./sim/scripts/run_verilator.sh

control_unit_formal:
  stage: sim
  image: $SIM_IMAGE
  resource_group: sim-runner
  timeout: 5m
  script:
    - cd formal/control_unit
    - sby -f control_unit.sby
    - sby -f control_unit_cover.sby

mac_pe_formal:
  stage: sim
  image: $SIM_IMAGE
  resource_group: sim-runner
  timeout: 5m
  script:
    - cd formal/mac_pe
    - sby -f mac_pe.sby
    - sby -f mac_pe_cover.sby

systolic_array_formal:
  stage: sim
  image: $SIM_IMAGE
  resource_group: sim-runner
  timeout: 10m
  script:
    - cd formal/systolic_array
    - sby -f systolic_array.sby
    - sby -f systolic_array_cover.sby

# pyuvm end-to-end test for accelerator_top: loads matrices A/B, triggers
# compute, drains C, compares against a Python golden model.  Runs on the
# same SIM_IMAGE (which includes pyuvm via requirements/sim.txt).
accel_uvm_sim:
  stage: sim
  image: $SIM_IMAGE
  resource_group: sim-runner
  timeout: 8m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: &uvm_paths
        - rtl/**/*
        - sim/testbenches/accel_uvm/**/*
        - sim/testbenches/common/**/*
        - requirements/sim.txt
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *uvm_paths
  script:
    - cd sim/testbenches/accel_uvm && make

# ---------------------------------------------------------------------------
# Full-SoC, bus-driven functional test: the Ibex core executes sw/accel/accel.c
# and drives the accelerator through the real OBI/APB fabric (PASS when
# accel_result == 0xACCE5500). This verilates the ENTIRE SoC (Ibex + fabric +
# accelerator), which is heavy, so it is guarded:
#   * runs only when accelerator RTL / the SoC integration changes,
#   * serialized via the shared sim-runner resource_group,
#   * single-threaded + output-split build (VERILATOR_JOBS=1) to bound peak RAM
#     on the ~900 MB group5-runner host (a swapfile on the host absorbs the
#     remaining headroom),
#   * generous timeout because the constrained, swap-backed build is slow.
# Needs the Didactic-SoC submodule checked out (non-recursive: its nested
# Subsystem_* submodules use SSH and are not required for this build). The
# bender/vendored dependencies are prebaked into SOC_IMAGE at /opt/soc-deps.
# ---------------------------------------------------------------------------
accel_soc_sim:
  stage: sim
  image: $SOC_IMAGE
  resource_group: sim-runner
  timeout: 30m
  variables:
    GIT_SUBMODULE_STRATEGY: normal
    GIT_SUBMODULE_DEPTH: 1
    VERILATOR_JOBS: "1"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: &soc_paths
        - rtl/**/*
        - Didactic-SoC
        - ci/soc.Dockerfile
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *soc_paths
  script:
    # Restore the prebaked SoC dependencies into the freshly checked-out
    # submodule working tree (both paths are gitignored, so absent after clone).
    - cp -a /opt/soc-deps/.bender Didactic-SoC/.bender
    - cp -a /opt/soc-deps/vendor_ips Didactic-SoC/vendor_ips
    - cd Didactic-SoC && python3 ./verification/verilator/verilate_soc_accel.py


# ---------------------------------------------------------------------------
# CPU vs. Accelerator GEMM benchmark — wall-clock speedup report.
#
# Runs the 16×16 INT8 configuration (full hardware utilisation) using the
# prebuilt verification/verilator/benchmark.hex.  Produces a GitLab Metrics
# artifact (benchmark_metrics.txt in Prometheus key-value format) that is
# displayed under Pipeline → Metrics and tracked across commits.
#
# Rebuild the hex locally when firmware changes:
#   make -C Didactic-SoC verilate_benchmark_16
#
# Same trigger paths and infrastructure requirements as accel_soc_sim.
# ---------------------------------------------------------------------------
benchmark_sim:
  stage: sim
  image: $SOC_IMAGE
  resource_group: sim-runner
  timeout: 20m
  variables:
    GIT_SUBMODULE_STRATEGY: normal
    GIT_SUBMODULE_DEPTH: 1
    VERILATOR_JOBS: "1"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: &benchmark_paths
        - rtl/**/*
        - Didactic-SoC
        - ci/soc.Dockerfile
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *benchmark_paths
  script:
    - cp -a /opt/soc-deps/.bender Didactic-SoC/.bender
    - cp -a /opt/soc-deps/vendor_ips Didactic-SoC/vendor_ips
    - cd Didactic-SoC
    - python3 ./verification/verilator/verilate_soc_benchmark.py 2>&1 | tee /tmp/bench_out.txt
    - python3 ../scripts/parse_benchmark_metrics.py /tmp/bench_out.txt benchmark_metrics.txt
  artifacts:
    when: always
    reports:
      metrics: Didactic-SoC/benchmark_metrics.txt
    paths:
      - Didactic-SoC/benchmark_metrics.txt
    expire_in: 4 weeks
