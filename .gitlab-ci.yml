stages:
  - check
  - sim

check_conventions:
  stage: check
  image: python:3-slim
  script:
    - pip install -r requirements.txt
    - python3 scripts/check_conventions.py

check_python_format:
  stage: check
  image: python:3-slim
  script:
    - pip install -r requirements.txt
    - black --check .

cocotb_sim:
  stage: sim
  image: verilator/verilator:5.020
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends python3 python3-pip make g++
    - pip3 install --break-system-packages -r requirements.txt
  script:
    - pytest -vv sim/test_runner.py

