stages:
  - build
  - check
  - sim

variables:
  # Prebuilt CI images stored in the project's GitLab Container Registry.
  # Built by the 'build' stage only when their Dockerfile or requirements
  # change; the check/sim jobs then reuse them with no apt/pip install.
  CHECK_IMAGE: "$CI_REGISTRY_IMAGE/ci-check:latest"
  SIM_IMAGE: "$CI_REGISTRY_IMAGE/ci-sim:latest"

# ---------------------------------------------------------------------------
# Build stage: build the check/sim images once and push them to the registry.
# Subsequent pipelines reuse the published images, so the check/sim jobs no
# longer run apt-get/pip install (saves server bandwidth and CI time).
# Jobs only run when the relevant Dockerfile or requirements file changes,
# and can also be triggered manually.
# ---------------------------------------------------------------------------
.build_image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

build_check_image:
  extends: .build_image
  script:
    - docker pull "$CHECK_IMAGE" || true
    - docker build --cache-from "$CHECK_IMAGE" -f ci/check.Dockerfile -t "$CHECK_IMAGE" .
    - docker push "$CHECK_IMAGE"
  rules:
    - changes:
        - ci/check.Dockerfile
        - requirements/check.txt
    - when: manual
      allow_failure: true

build_sim_image:
  extends: .build_image
  script:
    - docker pull "$SIM_IMAGE" || true
    - docker build --cache-from "$SIM_IMAGE" -f ci/sim.Dockerfile -t "$SIM_IMAGE" .
    - docker push "$SIM_IMAGE"
  rules:
    - changes:
        - ci/sim.Dockerfile
        - requirements/sim.txt
    - when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# Check stage: tooling (ruff, pre_commit) is baked into CHECK_IMAGE.
# ---------------------------------------------------------------------------
check_conventions:
  stage: check
  image: $CHECK_IMAGE
  script:
    - python3 scripts/check_conventions.py

check_python_format:
  stage: check
  image: $CHECK_IMAGE
  script:
    - ruff format --check .

check_gitkeep:
  stage: check
  image: $CHECK_IMAGE
  script:
    - python3 scripts/check_gitkeep.py

# ---------------------------------------------------------------------------
# Sim stage: Verilator + Python sim deps are baked into SIM_IMAGE.
# ---------------------------------------------------------------------------
cocotb_sim:
  stage: sim
  image: $SIM_IMAGE
  script:
    - pytest -vv sim/test_runner.py

accel_verilator_sim:
  stage: sim
  image: $SIM_IMAGE
  script:
    - ./sim/scripts/run_verilator.sh


