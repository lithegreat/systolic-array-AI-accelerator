repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3

  - repo: local
    hooks:
      - id: check-conventions
        name: Check Project Conventions (Interface Naming & Root Files)
        entry: python scripts/check_conventions.py
        language: system
        pass_filenames: false
        always_run: true

      - id: check-gitkeep
        name: Check .gitkeep not mixed with real content
        entry: python scripts/check_gitkeep.py
        language: system
        pass_filenames: false
        always_run: true
